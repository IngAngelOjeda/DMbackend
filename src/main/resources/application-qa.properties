#Server
server.port=${SERVER_PORT:8088}
server.servlet.context-path=/api

#Configuracion del FrontEnd
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

#Configuracion de Keycloack
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_AUTH_SERVER_URL:http://192.168.100.62:8080}/realms/${KEYCLOAK_REALM:dm-dev}
keycloak.auth-server-url=${KEYCLOAK_AUTH_SERVER_URL:http://192.168.100.62:8080}
keycloak.client-id=${KEYCLOAK_CLIENT_ID:dm-client-api-rest}
keycloak.realm=${KEYCLOAK_REALM:dm-dev}
keycloak.client-secret=${KEYCLOAK_CLIENT_SECRET:a2cSTRcRAUYsNph6yZelyEWwdMsQCTcf}
logging.level.org.keycloak=DEBUG
jwt.auth.converter.resource-id=${KEYCLOAK_CLIENT_ID:dm-client-api-rest}
jwt.auth.converter.principle-attribute=preferred_username

#Configuracion DB
spring.datasource.url=${DB_URL:jdbc:postgresql://192.168.100.62:5432/dm_db}
spring.datasource.username=${DB_USERNAME:devuser}
spring.datasource.password=${DB_PASSWORD:devpass123}
spring.datasource.driver-class-name=org.postgresql.Driver

#Configuracion de Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate

#Mostrar consultas SQL en consola
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#Actuator
management.endpoints.web.exposure.include=health,info,loggers

