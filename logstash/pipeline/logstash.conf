input {
  beats {
    port => 5044
  }
}

filter {
  # Si tus logs son texto con patrón, podés parsearlos con grok
  grok {
    match => {
      "message" => "%{TIMESTAMP_ISO8601:timestamp} \[%{DATA:thread}\] %{LOGLEVEL:level}\s+%{DATA:logger} - %{GREEDYDATA:msg}"
    }
  }

  # Convertir timestamp si se parseó
  date {
    match => ["timestamp", "yyyy-MM-dd HH:mm:ss"]
    target => "@timestamp"
  }

  mutate {
    rename => { "msg" => "message" }
    remove_field => ["timestamp"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "factupy-logs-%{+YYYY.MM.dd}"
  }

  # útil para debug
  stdout { codec => rubydebug }
}