version: '3.9'

services:
  dmBackend:
    build: .
    container_name: dmBackend
    image: dmbackend-api:latest
    ports:
      - "${SERVER_PORT:-8088}:${SERVER_PORT:-8088}"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: ${SERVER_PORT:-8088}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200}
      KEYCLOAK_AUTH_SERVER_URL: ${KEYCLOAK_AUTH_SERVER_URL:-http://192.168.100.62:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-dm-dev}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-dm-client-api-rest}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-a2cSTRcRAUYsNph6yZelyEWwdMsQCTcf}
      DB_URL: ${DB_URL:-jdbc:postgresql://192.168.100.62:5432/dm_db}
      DB_USERNAME: ${DB_USERNAME:-devuser}
      DB_PASSWORD: ${DB_PASSWORD:-devpass123}
      LOG_PATH: /var/log/app
    volumes:
      - /var/log/dm-api:/var/log/app
    networks:
      - infra_net
    restart: always

networks:
  infra_net:
    external: true
